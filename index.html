<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Praveen Kumar</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #1a1a2e, #16213e, #0f3460);
      color: white;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }
    .card {
      text-align: center;
      padding: 50px;
      background: rgba(255,255,255,0.1);
      border-radius: 20px;
      backdrop-filter: blur(10px);
    }
    h1 { font-size: 3rem; margin-bottom: 10px; }
    p { font-size: 1.2rem; color: #a8dadc; margin-bottom: 20px; }
    .badge {
      background: #e63946;
      padding: 8px 20px;
      border-radius: 20px;
      font-size: 1rem;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>👋 Hi, I'm Praveen Kumar</h1>
    <p>OpenShift Developer | Cloud Enthusiast</p>
    <span class="badge">🚀 Deployed on OpenShift</span>
  </div>
</body>
</html>
